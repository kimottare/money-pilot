<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Pilot - Cloud Edition</title>
    
    <!-- ★追加: iOS ホーム画面用（PWA）設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Money Pilot">

    <!-- ★追加: アイコン動的生成スクリプト（モダンな紙飛行機デザイン） -->
    <script>
        (function() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // 背景：ダークスレートのグラデーション（クールな夜空）
            const grad = ctx.createLinearGradient(0, 0, 512, 512);
            grad.addColorStop(0, '#1e293b'); // slate-800
            grad.addColorStop(1, '#0f172a'); // slate-900
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 512, 512);

            // モチーフ：上昇する紙飛行機（ナビゲートの象徴）
            // 左翼（明るいスカイブルー）
            ctx.fillStyle = '#38bdf8'; 
            ctx.beginPath();
            ctx.moveTo(400, 112); // 先端
            ctx.lineTo(112, 224); // 左端
            ctx.lineTo(256, 288); // 中央
            ctx.closePath();
            ctx.fill();

            // 右翼（少し暗めのブルーで立体感を演出）
            ctx.fillStyle = '#0284c7'; 
            ctx.beginPath();
            ctx.moveTo(400, 112); // 先端
            ctx.lineTo(256, 288); // 中央
            ctx.lineTo(352, 400); // 右端
            ctx.closePath();
            ctx.fill();

            // 尾翼（中間のブルー）
            ctx.fillStyle = '#0ea5e9'; 
            ctx.beginPath();
            ctx.moveTo(256, 288); // 中央
            ctx.lineTo(224, 384); // 下端
            ctx.lineTo(288, 336); // 右折れ目
            ctx.closePath();
            ctx.fill();

            const iconUrl = canvas.toDataURL('image/png');
            
            // iOS用アイコンとして登録
            const appleLink = document.createElement('link');
            appleLink.rel = 'apple-touch-icon';
            appleLink.href = iconUrl;
            document.head.appendChild(appleLink);
            
            // ついでにPCブラウザのタブ用アイコン（ファビコン）にも登録
            const favicon = document.createElement('link');
            favicon.rel = 'icon';
            favicon.href = iconUrl;
            document.head.appendChild(favicon);
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, onSnapshot };
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ★★★ ここにFirebaseの画面でコピーした設定コードを貼り付けます ★★★
        const firebaseConfig = {
            apiKey: "AIzaSyARvTLUOjWBwMVV9n98Z8BzZnZ7BnVPlCw",
            authDomain: "moneybuddy-6fe1a.firebaseapp.com",
            projectId: "moneybuddy-6fe1a",
            storageBucket: "moneybuddy-6fe1a.firebasestorage.app",
            messagingSenderId: "277966072663",
            appId: "1:277966072663:web:8573be58bf88d8288a2c12"
        };
        // ★★★ ここまで ★★★

        const defaultCategoryMapping = {
            '食費': 'needs', '交通費': 'needs', '日用品': 'needs', '家具家電': 'needs',
            '美容/健康': 'investment', '本': 'investment',
            'タバコ': 'wants', 'ファッション': 'wants', 'ゲーム': 'wants', '外食費': 'wants',
            '遊興費': 'wants', '映画': 'wants', '趣味': 'wants', 'サブスクリプション': 'wants'
        };

        const defaultFixedCosts = [
            { id: 'f1', name: '家賃・住居費', amount: 60000, category: 'needs' },
            { id: 'f2', name: '奨学金返済', amount: 15000, category: 'needs' }
        ];

        const categoryLabels = {
            needs: { label: '必要な支出', color: 'bg-green-500', text: 'text-green-700' },
            wants: { label: '浪費', color: 'bg-red-500', text: 'text-red-700' },
            investment: { label: '投資', color: 'bg-blue-500', text: 'text-blue-700' }
        };

        const getMonthString = (dateString) => {
            if (!dateString) return '不明';
            const parts = dateString.split(/[\/\-]/);
            if (parts.length >= 2) {
                const year = parts[0];
                const month = parts[1].padStart(2, '0');
                return `${year}年${month}月`;
            }
            return '不明';
        };

        const getYearString = (dateString) => {
            if (!dateString) return '不明';
            const parts = dateString.split(/[\/\-]/);
            if (parts.length >= 1) return `${parts[0]}年`;
            return '不明';
        };

        let app, auth, db;
        function MainApp({ config }) {
            const [user, setUser] = useState(null);
            const [expenses, setExpenses] = useState([]);
            const [categoryMapping, setCategoryMapping] = useState(defaultCategoryMapping);
            const [income, setIncome] = useState(200000); 
            const [fixedCosts, setFixedCosts] = useState(defaultFixedCosts); 
            
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [settingsTab, setSettingsTab] = useState('budget'); 
            
            const [selectedDetailType, setSelectedDetailType] = useState(null);
            const [expandedCategory, setExpandedCategory] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [viewMode, setViewMode] = useState('month'); 
            const [selectedMonth, setSelectedMonth] = useState(''); 
            const [selectedYear, setSelectedYear] = useState(''); 

            useEffect(() => {
                const initFirebase = async () => {
                    const fb = window.FirebaseSDK;
                    if (!app) {
                        app = fb.initializeApp(config);
                        auth = fb.getAuth(app);
                        db = fb.getFirestore(app);
                    }
                    try {
                        await fb.signInAnonymously(auth);
                    } catch (error) {
                        console.error("Login Error:", error);
                    }
                    fb.onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        if (!u) setIsLoading(false);
                    });
                };
                initFirebase();
            }, [config]);

            useEffect(() => {
                if (!user) return;
                const fb = window.FirebaseSDK;
                const userDocRef = fb.doc(db, 'artifacts', config.projectId, 'users', user.uid, 'settings', 'main');
                
                const unsubscribe = fb.onSnapshot(userDocRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        setExpenses(data.expenses || []);
                        setCategoryMapping(data.mapping || defaultCategoryMapping);
                        if (data.income !== undefined) setIncome(data.income);
                        if (data.fixedCosts) setFixedCosts(data.fixedCosts);
                    }
                    setIsLoading(false);
                }, (error) => {
                    console.error("Firestore Listen Error:", error);
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, [user, config.projectId]);

            const saveToCloud = async (updateData) => {
                if (!user) return;
                const fb = window.FirebaseSDK;
                const userDocRef = fb.doc(db, 'artifacts', config.projectId, 'users', user.uid, 'settings', 'main');
                try {
                    await fb.setDoc(userDocRef, { ...updateData, updatedAt: new Date().toISOString() }, { merge: true });
                } catch (error) {
                    console.error("Error saving data: ", error);
                    alert("クラウドへの保存に失敗しました。");
                }
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const lines = text.trim().split(/\r\n|\n|\r/);
                    const parsedData = [];
                    
                    for (let i = 1; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (!line) continue; 
                        
                        const values = line.split(',');
                        if (values.length >= 4) {
                            const cleanAmountStr = values[0].replace(/"/g, '').trim();
                            const amount = parseInt(cleanAmountStr, 10);
                            
                            if (!isNaN(amount)) {
                                parsedData.push({
                                    id: typeof crypto !== 'undefined' && crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                                    amount: Math.abs(amount),
                                    date: values[1].replace(/"/g, '').trim(),
                                    memo: values[2].replace(/"/g, '').trim(),
                                    category: values[3].replace(/"/g, '').trim()
                                });
                            }
                        }
                    }
                    
                    if (parsedData.length > 0) {
                        parsedData.sort((a, b) => new Date(b.date) - new Date(a.date));
                        await saveToCloud({ expenses: parsedData });
                        alert(`${parsedData.length}件のデータを読み込みました！`);
                    } else {
                        alert("データを読み込めませんでした。");
                    }
                    event.target.value = '';
                };
                reader.readAsText(file);
            };

            const handleCategoryChange = async (category, newType) => {
                const updatedMapping = { ...categoryMapping, [category]: newType };
                setCategoryMapping(updatedMapping);
                await saveToCloud({ mapping: updatedMapping });
            };

            const handleExpenseTypeChange = async (targetExp, newType) => {
                const defaultType = categoryMapping[targetExp.category] || 'needs';
                const newExpenses = expenses.map(exp => {
                    const isMatch = exp.id ? exp.id === targetExp.id : (exp.date === targetExp.date && exp.amount === targetExp.amount && exp.memo === targetExp.memo && exp.category === targetExp.category);
                    if (isMatch) {
                        const updatedExp = { ...exp };
                        if (newType === defaultType) delete updatedExp.manualType;
                        else updatedExp.manualType = newType;
                        return updatedExp;
                    }
                    return exp;
                });
                setExpenses(newExpenses);
                await saveToCloud({ expenses: newExpenses });
            };

            const handleAddFixedCost = () => {
                const newCost = { id: crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(), name: '新規固定費', amount: 0, category: 'needs' };
                const newFixedCosts = [...fixedCosts, newCost];
                setFixedCosts(newFixedCosts);
                saveToCloud({ fixedCosts: newFixedCosts });
            };

            const handleUpdateFixedCost = (id, field, value) => {
                const newFixedCosts = fixedCosts.map(c => c.id === id ? { ...c, [field]: value } : c);
                setFixedCosts(newFixedCosts);
                saveToCloud({ fixedCosts: newFixedCosts });
            };

            const handleDeleteFixedCost = (id) => {
                const newFixedCosts = fixedCosts.filter(c => c.id !== id);
                setFixedCosts(newFixedCosts);
                saveToCloud({ fixedCosts: newFixedCosts });
            };

            const handleIncomeChange = (val) => {
                const num = parseInt(val, 10) || 0;
                setIncome(num);
                saveToCloud({ income: num });
            };

            // ★ 新機能: 読み込んだ個別の支出データを削除する関数
            const handleDeleteExpense = async (targetExp) => {
                if (window.confirm('この支出データを削除してもよろしいですか？')) {
                    const newExpenses = expenses.filter(exp => exp.id !== targetExp.id);
                    setExpenses(newExpenses); // 画面に即反映
                    await saveToCloud({ expenses: newExpenses }); // クラウドに保存
                }
            };

            const getExpenseType = (exp) => exp.manualType || categoryMapping[exp.category] || 'needs';

            const availableMonths = useMemo(() => {
                const months = new Set();
                expenses.forEach(exp => months.add(getMonthString(exp.date)));
                return Array.from(months).sort().reverse();
            }, [expenses]);

            const availableYears = useMemo(() => {
                const years = new Set();
                expenses.forEach(exp => years.add(getYearString(exp.date)));
                return Array.from(years).sort().reverse();
            }, [expenses]);

            useEffect(() => {
                if (availableMonths.length > 0 && (!selectedMonth || !availableMonths.includes(selectedMonth))) setSelectedMonth(availableMonths[0]);
                if (availableYears.length > 0 && (!selectedYear || !availableYears.includes(selectedYear))) setSelectedYear(availableYears[0]);
            }, [availableMonths, availableYears, selectedMonth, selectedYear]);

            const filteredExpenses = useMemo(() => {
                if (viewMode === 'month') return selectedMonth ? expenses.filter(exp => getMonthString(exp.date) === selectedMonth) : [];
                return selectedYear ? expenses.filter(exp => getYearString(exp.date) === selectedYear) : [];
            }, [expenses, selectedMonth, selectedYear, viewMode]);

            const variableMonthData = useMemo(() => {
                const summary = { needs: 0, wants: 0, investment: 0 };
                filteredExpenses.forEach(exp => { summary[getExpenseType(exp)] += exp.amount; });
                return summary;
            }, [filteredExpenses, categoryMapping]);

            const fixedTotalData = useMemo(() => {
                const summary = { needs: 0, wants: 0, investment: 0 };
                fixedCosts.forEach(cost => { summary[cost.category] += cost.amount; });
                if (viewMode === 'year') { summary.needs *= 12; summary.wants *= 12; summary.investment *= 12; }
                return summary;
            }, [fixedCosts, viewMode]);

            const currentTotalData = useMemo(() => ({
                needs: variableMonthData.needs + fixedTotalData.needs,
                wants: variableMonthData.wants + fixedTotalData.wants,
                investment: variableMonthData.investment + fixedTotalData.investment
            }), [variableMonthData, fixedTotalData]);

            const totalFixed = fixedTotalData.needs + fixedTotalData.wants + fixedTotalData.investment;
            const totalVariable = variableMonthData.needs + variableMonthData.wants + variableMonthData.investment;
            const targetIncome = viewMode === 'year' ? income * 12 : income;
            const remainingMoney = targetIncome - totalFixed - totalVariable;
            const remainingPercent = Math.max(0, (remainingMoney / targetIncome) * 100);

            const groupedExpenses = useMemo(() => {
                if (!selectedDetailType) return [];
                const fixedItems = fixedCosts.filter(c => c.category === selectedDetailType).map(c => ({
                    date: '毎月固定', memo: '固定費設定より', amount: viewMode === 'year' ? c.amount * 12 : c.amount, isFixed: true
                }));
                const grouped = {};
                if (fixedItems.length > 0) grouped['📌 固定費'] = { total: fixedItems.reduce((s, i) => s + i.amount, 0), items: fixedItems };
                const filteredVars = filteredExpenses.filter(exp => getExpenseType(exp) === selectedDetailType);
                filteredVars.forEach(exp => {
                    if (!grouped[exp.category]) grouped[exp.category] = { total: 0, items: [] };
                    grouped[exp.category].total += exp.amount;
                    grouped[exp.category].items.push(exp);
                });
                return Object.entries(grouped).sort((a, b) => b[1].total - a[1].total);
            }, [filteredExpenses, categoryMapping, selectedDetailType, fixedCosts, viewMode]);

            // ★ 新機能: ペース分析・アドバイス生成ロジック ★
            const getPilotMessage = () => {
                if (remainingMoney < 0) return { text: "⚠️ 警告：予算をオーバーしています！支出を見直しましょう。", color: "bg-red-100 text-red-800 border-red-200" };
                if (remainingPercent < 10) return { text: "🛬 注意：残りの燃料（資金）がわずかです。セーブモードに入ってください。", color: "bg-yellow-100 text-yellow-800 border-yellow-200" };
                if (currentTotalData.wants > (targetIncome * 0.3)) return { text: "💡 アドバイス：浪費（Wants）が収入の30%を超えています。少し引き締めましょう。", color: "bg-orange-100 text-orange-800 border-orange-200" };
                
                if (viewMode === 'month' && selectedMonth) {
                    const today = new Date();
                    const currentMonthStr = `${today.getFullYear()}年${String(today.getMonth() + 1).padStart(2, '0')}月`;
                    
                    if (selectedMonth === currentMonthStr) {
                        const currentDay = today.getDate();
                        const prevMonthDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
                        const prevMonthStr = `${prevMonthDate.getFullYear()}年${String(prevMonthDate.getMonth() + 1).padStart(2, '0')}月`;
                        
                        // 前月の同じ日までの変動費を取得
                        const prevMonthExpenses = expenses.filter(exp => {
                            if (getMonthString(exp.date) !== prevMonthStr) return false;
                            const parts = exp.date.split(/[\/\-]/);
                            if (parts.length >= 3) {
                                const day = parseInt(parts[2], 10);
                                return day <= currentDay;
                            }
                            return false;
                        });

                        if (prevMonthExpenses.length > 0) {
                            let prevVarTotal = 0;
                            let prevWantsTotal = 0;
                            prevMonthExpenses.forEach(exp => {
                                prevVarTotal += exp.amount;
                                const type = exp.manualType || categoryMapping[exp.category] || 'needs';
                                if (type === 'wants') prevWantsTotal += exp.amount;
                            });
                            
                            const diff = totalVariable - prevVarTotal;
                            const wantsDiff = variableMonthData.wants - prevWantsTotal;

                            if (diff > 5000) {
                                if (wantsDiff > 3000) {
                                     return { text: `📊 ペース分析：前月の同日より浪費(Wants)が ${wantsDiff.toLocaleString()}円 多いペースです。意識して抑えましょう！`, color: "bg-orange-100 text-orange-800 border-orange-200" };
                                }
                                return { text: `📊 ペース分析：前月の同日より支出全体が ${diff.toLocaleString()}円 多いです。後半は引き締めましょう。`, color: "bg-orange-100 text-orange-800 border-orange-200" };
                            } else if (diff < -5000) {
                                return { text: `✨ 素晴らしい！前月の同日より支出を ${Math.abs(diff).toLocaleString()}円 抑えられています。`, color: "bg-green-100 text-green-800 border-green-200" };
                            }
                        }
                    } else {
                        // 過去の月の結果報告
                        const [yearStr, monthStr] = selectedMonth.replace('月','').split('年');
                        if (yearStr && monthStr) {
                            const yearNum = parseInt(yearStr, 10);
                            const monthNum = parseInt(monthStr, 10) - 1; 
                            
                            const prevMonthDate = new Date(yearNum, monthNum - 1, 1);
                            const prevMonthStr = `${prevMonthDate.getFullYear()}年${String(prevMonthDate.getMonth() + 1).padStart(2, '0')}月`;
                            
                            const prevMonthExpenses = expenses.filter(exp => getMonthString(exp.date) === prevMonthStr);
                            if (prevMonthExpenses.length > 0) {
                                 let prevVarTotal = 0;
                                 prevMonthExpenses.forEach(exp => { prevVarTotal += exp.amount; });
                                 const diff = totalVariable - prevVarTotal;
                                 
                                 if (diff > 0) {
                                     return { text: `📝 振り返り：この月は前月より支出が ${diff.toLocaleString()}円 多かった月でした。`, color: "bg-slate-100 text-slate-700 border-slate-200" };
                                 } else if (diff < 0) {
                                     return { text: `📝 振り返り：この月は前月より支出を ${Math.abs(diff).toLocaleString()}円 節約できた優秀な月でした！`, color: "bg-blue-100 text-blue-700 border-blue-200" };
                                 }
                            }
                        }
                    }
                }
                return { text: "✈️ フライト順調です！このままのペースを維持しましょう。", color: "bg-blue-100 text-blue-800 border-blue-200" };
            };
            const pilotMsg = getPilotMessage();

            if (isLoading) return <div className="flex items-center justify-center h-screen text-slate-500">システム初期化中...</div>;

            return (
                <div className="min-h-screen flex justify-center font-sans pb-24">
                    <div className="w-full max-w-md bg-white shadow-xl relative min-h-screen">
                        
                        <header className="bg-slate-900 text-white text-center sticky top-0 z-20">
                            <div className="p-4 flex justify-between items-center">
                                <h1 className="text-xl font-black tracking-wider italic">Money Pilot ✈️</h1>
                                <label className="bg-blue-500 hover:bg-blue-400 text-white text-xs font-bold py-2 px-4 rounded shadow transition cursor-pointer">
                                    CSV同期
                                    <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                                </label>
                            </div>
                            
                            <div className="flex bg-slate-800">
                                <button className={`flex-1 py-3 text-sm font-bold transition ${viewMode === 'month' ? 'text-blue-400 border-b-2 border-blue-400 bg-slate-900' : 'text-slate-400 hover:bg-slate-700'}`} onClick={() => setViewMode('month')}>MONTH</button>
                                <button className={`flex-1 py-3 text-sm font-bold transition ${viewMode === 'year' ? 'text-blue-400 border-b-2 border-blue-400 bg-slate-900' : 'text-slate-400 hover:bg-slate-700'}`} onClick={() => setViewMode('year')}>YEAR</button>
                            </div>
                            
                            <div className="bg-slate-100 flex justify-between items-center px-4 py-2 text-slate-800 border-b">
                                <button onClick={() => {
                                    const list = viewMode === 'month' ? availableMonths : availableYears;
                                    const setter = viewMode === 'month' ? setSelectedMonth : setSelectedYear;
                                    const current = viewMode === 'month' ? selectedMonth : selectedYear;
                                    const idx = list.indexOf(current);
                                    if (idx < list.length - 1) setter(list[idx + 1]);
                                }} className="disabled:opacity-30 p-2 text-sm font-bold">◀ 前</button>
                                <div className="font-bold text-lg">{viewMode === 'month' ? selectedMonth : selectedYear}</div>
                                <button onClick={() => {
                                    const list = viewMode === 'month' ? availableMonths : availableYears;
                                    const setter = viewMode === 'month' ? setSelectedMonth : setSelectedYear;
                                    const current = viewMode === 'month' ? selectedMonth : selectedYear;
                                    const idx = list.indexOf(current);
                                    if (idx > 0) setter(list[idx - 1]);
                                }} className="disabled:opacity-30 p-2 text-sm font-bold">次 ▶</button>
                            </div>
                        </header>

                        <div className="p-4 space-y-6">
                            
                            {/* パイロットボード (メッセージ部分) */}
                            <div className="bg-white rounded-2xl border-2 border-slate-100 shadow-sm overflow-hidden">
                                <div className={`px-4 py-3 text-sm font-bold border-b transition-colors duration-500 ${pilotMsg.color}`}>
                                    {pilotMsg.text}
                                </div>
                                <div className="p-5">
                                    <p className="text-xs text-slate-500 font-bold mb-1">今月自由に使えるお金（残燃料）</p>
                                    <div className="flex items-end space-x-2 mb-3">
                                        <span className="text-3xl font-black text-slate-800">¥{remainingMoney.toLocaleString()}</span>
                                        <span className="text-sm text-slate-400 mb-1">/ 予算 ¥{(targetIncome - totalFixed).toLocaleString()}</span>
                                    </div>
                                    <div className="w-full h-4 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                        <div className={`h-full transition-all duration-500 ${remainingPercent > 20 ? 'bg-blue-500' : 'bg-red-500'}`} style={{ width: `${remainingPercent}%` }} />
                                    </div>
                                    <div className="flex justify-between text-xs text-slate-500 mt-2 font-medium">
                                        <span>固定費済: ¥{totalFixed.toLocaleString()}</span>
                                        <span>変動費使用: ¥{totalVariable.toLocaleString()}</span>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white rounded-xl border p-5 shadow-sm">
                                <h2 className="text-sm font-bold mb-4 text-slate-400 tracking-wide uppercase border-b pb-2">BALANCE</h2>
                                {['needs', 'wants', 'investment'].map(type => {
                                    const current = currentTotalData[type];
                                    const ratios = { needs: 0.5, wants: 0.3, investment: 0.2 };
                                    const target = targetIncome * ratios[type];
                                    const percent = Math.min((current / target) * 100, 100) || 0;
                                    return (
                                        <div key={type} className="mb-4 cursor-pointer hover:bg-slate-50 p-2 -mx-2 rounded-lg transition" onClick={() => setSelectedDetailType(type)}>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span className={`font-bold ${categoryLabels[type].text}`}>{categoryLabels[type].label}</span>
                                                <span className="text-slate-700 font-medium">
                                                    ¥{current.toLocaleString()} <span className="text-xs text-slate-400 font-normal">/ 目安 ¥{target.toLocaleString()}</span>
                                                </span>
                                            </div>
                                            <div className="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                                                <div className={`h-full ${categoryLabels[type].color}`} style={{ width: `${percent}%` }} />
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="fixed bottom-0 w-full max-w-md bg-white border-t p-3 z-20 pb-safe">
                            <button onClick={() => setIsSettingsOpen(true)} className="w-full bg-slate-800 hover:bg-slate-900 py-3.5 rounded-xl font-bold text-white shadow transition flex justify-center items-center space-x-2">
                                <span>⚙️ フライト設定（予算・固定費・分類）</span>
                            </button>
                        </div>

                        {/* 設定モーダル */}
                        {isSettingsOpen && (
                            <div className="fixed inset-0 bg-slate-900 bg-opacity-60 z-30 flex items-end sm:items-center justify-center p-0 sm:p-4">
                                <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl h-[85vh] sm:h-auto sm:max-h-[85vh] flex flex-col shadow-2xl overflow-hidden animate-slide-up">
                                    <div className="flex justify-between items-center p-5 border-b bg-white z-10">
                                        <h3 className="text-lg font-black text-slate-800">フライト設定</h3>
                                        <button onClick={() => setIsSettingsOpen(false)} className="bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full w-8 h-8 flex items-center justify-center font-bold">✕</button>
                                    </div>
                                    
                                    <div className="flex border-b bg-slate-50 text-sm font-bold">
                                        <button className={`flex-1 py-3 ${settingsTab === 'budget' ? 'text-blue-600 border-b-2 border-blue-600 bg-white' : 'text-slate-400'}`} onClick={() => setSettingsTab('budget')}>収入・固定費</button>
                                        <button className={`flex-1 py-3 ${settingsTab === 'category' ? 'text-blue-600 border-b-2 border-blue-600 bg-white' : 'text-slate-400'}`} onClick={() => setSettingsTab('category')}>カテゴリー分類</button>
                                    </div>

                                    <div className="overflow-y-auto p-5 flex-1 bg-white">
                                        {settingsTab === 'budget' && (
                                            <div className="space-y-6">
                                                <div>
                                                    <label className="block text-sm font-bold text-slate-700 mb-2">手取り月収（ベース予算）</label>
                                                    <div className="relative">
                                                        <span className="absolute left-3 top-3 text-slate-500">¥</span>
                                                        <input type="number" value={income} onChange={(e) => handleIncomeChange(e.target.value)} className="w-full pl-8 p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                                    </div>
                                                </div>

                                                <div className="border-t pt-6">
                                                    <div className="flex justify-between items-center mb-4">
                                                        <label className="text-sm font-bold text-slate-700">毎月の固定費</label>
                                                        <button onClick={handleAddFixedCost} className="text-xs bg-blue-100 text-blue-700 px-3 py-1.5 rounded-lg font-bold hover:bg-blue-200">+ 追加</button>
                                                    </div>
                                                    <div className="space-y-3">
                                                        {fixedCosts.map((cost) => (
                                                            <div key={cost.id} className="bg-slate-50 p-3 rounded-xl border border-slate-200 flex flex-col space-y-2">
                                                                <div className="flex space-x-2">
                                                                    <input type="text" value={cost.name} onChange={(e) => handleUpdateFixedCost(cost.id, 'name', e.target.value)} className="flex-1 p-2 border rounded-lg text-sm font-bold bg-white" placeholder="項目名" />
                                                                    <button onClick={() => handleDeleteFixedCost(cost.id)} className="text-red-400 hover:text-red-600 px-2 font-bold text-xl">×</button>
                                                                </div>
                                                                <div className="flex space-x-2">
                                                                    <div className="relative flex-1">
                                                                        <span className="absolute left-3 top-2 text-slate-500 text-sm">¥</span>
                                                                        <input type="number" value={cost.amount} onChange={(e) => handleUpdateFixedCost(cost.id, 'amount', parseInt(e.target.value) || 0)} className="w-full pl-7 p-2 border rounded-lg text-sm font-bold bg-white" />
                                                                    </div>
                                                                    <select value={cost.category} onChange={(e) => handleUpdateFixedCost(cost.id, 'category', e.target.value)} className="w-1/3 p-2 border rounded-lg text-sm bg-white text-slate-600">
                                                                        <option value="needs">Needs</option>
                                                                        <option value="wants">Wants</option>
                                                                        <option value="investment">Invest</option>
                                                                    </select>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        {settingsTab === 'category' && (
                                            <div className="space-y-3">
                                                {Object.keys(categoryMapping).map(cat => (
                                                    <div key={cat} className="flex items-center justify-between border-b border-slate-100 pb-3">
                                                        <span className="font-bold text-slate-700">{cat}</span>
                                                        <select value={categoryMapping[cat]} onChange={(e) => handleCategoryChange(cat, e.target.value)} className="text-sm p-2 rounded-lg border bg-slate-50 font-medium text-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                                                            <option value="needs">必要な支出</option>
                                                            <option value="wants">浪費</option>
                                                            <option value="investment">投資</option>
                                                        </select>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 内訳表示用モーダル */}
                        {selectedDetailType && (
                            <div className="fixed inset-0 bg-slate-900 bg-opacity-60 z-30 flex items-end sm:items-center justify-center p-0 sm:p-4">
                                <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl h-[80vh] sm:max-h-[80vh] flex flex-col shadow-2xl overflow-hidden animate-slide-up">
                                    <div className="flex justify-between items-center p-5 border-b bg-white z-10">
                                        <h3 className={`text-lg font-black ${categoryLabels[selectedDetailType].text}`}>
                                            {categoryLabels[selectedDetailType].label}の内訳
                                        </h3>
                                        <button onClick={() => { setSelectedDetailType(null); setExpandedCategory(null); }} className="bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-full w-8 h-8 flex items-center justify-center font-bold">✕</button>
                                    </div>
                                    <div className="overflow-y-auto p-4 space-y-3 flex-1 bg-slate-50">
                                        {groupedExpenses.map(([categoryName, data]) => (
                                            <div key={categoryName} className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                                <div className="flex justify-between items-center p-4 cursor-pointer hover:bg-slate-50 transition" onClick={() => setExpandedCategory(expandedCategory === categoryName ? null : categoryName)}>
                                                    <div className="font-bold text-slate-700 flex items-center">
                                                        {categoryName}
                                                        <span className="text-xs ml-2 text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{data.items.length}件</span>
                                                    </div>
                                                    <div className="flex items-center space-x-2">
                                                        <div className="font-black text-slate-800">¥{data.total.toLocaleString()}</div>
                                                        <span className="text-slate-300 text-xs">{expandedCategory === categoryName ? '▲' : '▼'}</span>
                                                    </div>
                                                </div>

                                                {expandedCategory === categoryName && (
                                                    <div className="bg-white border-t border-slate-100 divide-y divide-slate-50">
                                                        {data.items.map((exp, idx) => {
                                                            const currentType = getExpenseType(exp);
                                                            const isManual = !!exp.manualType;
                                                            return (
                                                                <div key={idx} className="flex justify-between items-center p-3 text-sm">
                                                                    <div className={`pl-2 border-l-2 ${exp.isFixed ? 'border-purple-400' : 'border-blue-400'} flex-1 overflow-hidden pr-2`}>
                                                                        <div className="text-xs text-slate-400 font-medium">{exp.date}</div>
                                                                        {exp.memo && <div className="text-slate-600 mt-0.5 truncate">{exp.memo}</div>}
                                                                    </div>
                                                                    <div className="flex flex-col items-end space-y-1 shrink-0">
                                                                        <div className="font-bold text-slate-600">¥{exp.amount.toLocaleString()}</div>
                                                                        {!exp.isFixed && (
                                                                            <div className="flex items-center space-x-2">
                                                                                <select 
                                                                                    value={currentType} 
                                                                                    onChange={(e) => handleExpenseTypeChange(exp, e.target.value)}
                                                                                    className={`text-[10px] border rounded px-1.5 py-0.5 outline-none font-medium cursor-pointer transition ${
                                                                                        isManual ? 'bg-yellow-50 border-yellow-300 text-yellow-800' : 'bg-white border-slate-200 text-slate-500'
                                                                                    }`}
                                                                                >
                                                                                    <option value="needs">必要</option>
                                                                                    <option value="wants">浪費</option>
                                                                                    <option value="investment">投資</option>
                                                                                </select>
                                                                                <button 
                                                                                    onClick={() => handleDeleteExpense(exp)} 
                                                                                    className="text-slate-300 hover:text-red-500 transition px-1 font-bold text-lg"
                                                                                    title="削除"
                                                                                >
                                                                                    ×
                                                                                </button>
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                        {groupedExpenses.length === 0 && (
                                            <p className="text-sm text-slate-400 text-center py-8 font-medium">この項目のデータがありません</p>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <style>{`
                            @keyframes slide-up {
                                from { transform: translateY(100%); opacity: 0; }
                                to { transform: translateY(0); opacity: 1; }
                            }
                            .animate-slide-up { animation: slide-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                            .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
                        `}</style>
                    </div>
                </div>
            );
        }

        function App() {
            const [isFirebaseLoaded, setIsFirebaseLoaded] = useState(!!window.FirebaseSDK);

            useEffect(() => {
                if (!window.FirebaseSDK) {
                    const handleLoad = () => setIsFirebaseLoaded(true);
                    window.addEventListener('firebase-loaded', handleLoad);
                    return () => window.removeEventListener('firebase-loaded', handleLoad);
                }
            }, []);

            if (!isFirebaseLoaded) return <div className="flex items-center justify-center h-screen text-slate-500 font-bold tracking-widest">SYSTEM BOOTING...</div>;
            
            if (firebaseConfig.apiKey === "YOUR_API_KEY") {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50">
                        <div className="bg-white p-6 rounded-2xl shadow-lg border-l-4 border-red-500 max-w-md">
                            <h2 className="text-lg font-black text-red-600 mb-2">⚠ 設定が必要です</h2>
                            <p className="text-sm text-slate-600 font-medium">
                                ソースコードの30行目付近にある <code className="bg-slate-100 px-1 rounded">firebaseConfig</code> の中身を、Firebaseから取得したコードに書き換えてください。
                            </p>
                        </div>
                    </div>
                );
            }

            return <MainApp config={firebaseConfig} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
